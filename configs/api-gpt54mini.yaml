# API backend: gpt-5.4-mini via the Perplexity proxy (key from .env at repo
# root or PERPLEXITY_API_KEY in the environment). Strong-model harness
# validation: single agent, 30 minutes (the M4 gate run).
# Usage: python -m minicoral start -c tasks/circle_packing/task.yaml -o configs/api-gpt54mini.yaml
agents:
  count: 1
  model: "gpt-5.4-mini"

engine:
  backend: api
  base_url: "https://api.perplexity.ai"
  api_key_env: "PERPLEXITY_API_KEY"
  max_context: 128000
  compact_at_tokens: 100000

run:
  wall_clock_hours: 0.5
