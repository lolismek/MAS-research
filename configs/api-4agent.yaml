# 4-agent shakedown on gpt-5.4-mini through the LOCAL proxy
# (scripts/pplx_proxy.py -- Perplexity serves gpt-5.4-mini only via
# /v1/responses, so the engine cannot hit api.perplexity.ai directly;
# the proxy also writes proxy_logs/calls.jsonl with exact per-call cost
# for scripts/cost_watch.py).
#
# Usage:
#   python scripts/pplx_proxy.py &          # needs PERPLEXITY_API_KEY
#   python -m minicoral start -c tasks/circle_packing/task.yaml -o configs/api-4agent.yaml
#   python scripts/cost_watch.py --budget 10
agents:
  count: 4
  model: "gpt-5.4-mini"   # name is cosmetic: the proxy aliases everything to openai/gpt-5.4-mini

engine:
  backend: api
  base_url: "http://127.0.0.1:8744/v1"
  api_key_env: "PERPLEXITY_API_KEY"  # proxy ignores client auth; engine just needs it non-empty
  max_context: 128000
  # Compact well below the model limit: no prompt caching through the
  # Responses proxy, so context length is the main cost driver.
  compact_at_tokens: 50000
  max_new_tokens: 4096

run:
  wall_clock_hours: 2.0
