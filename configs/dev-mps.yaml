# Mac development override: small model on MPS, short run.
# Usage: python -m minicoral start -c tasks/circle_packing/task.yaml -o configs/dev-mps.yaml
agents:
  count: 2
  model: "Qwen/Qwen3-4B"

engine:
  backend: hf
  device: mps
  dtype: float16   # bfloat16 support on MPS is incomplete

run:
  wall_clock_hours: 0.5
